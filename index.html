<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clawd app</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #1a1a2e);
      color: var(--tg-theme-text-color, #eee);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--tg-theme-secondary-bg-color, #16213e);
      border-radius: 20px;
      padding: 32px 24px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .emoji { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { font-size: 0.9rem; opacity: 0.7; margin-bottom: 24px; }
    .user-info {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }
    button {
      background: var(--tg-theme-button-color, #4a9eff);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🐾</div>
    <h1>clawd app</h1>
    <p>Твій перший Telegram Mini App</p>
    <div class="user-info" id="user-info">Завантаження...</div>
    <button onclick="handleClick()">Привіт!</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const infoEl = document.getElementById('user-info');

    if (user) {
      infoEl.innerHTML = `👤 ${user.first_name}${user.last_name ? ' ' + user.last_name : ''}<br>@${user.username || 'username'}`;
    } else {
      infoEl.textContent = '👤 Гість (відкрито поза Telegram)';
    }

    function handleClick() {
      tg.showAlert('Привіт! clawd app працює! 🐾');
    }
  </script>
</body>
</html>
