<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>☕ Cafe App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--tg-theme-bg-color, #0f0f1a);
      --bg2: var(--tg-theme-secondary-bg-color, #1a1a2e);
      --text: var(--tg-theme-text-color, #e8eaf0);
      --hint: var(--tg-theme-hint-color, #8892a4);
      --btn: var(--tg-theme-button-color, #3a86ff);
      --btn-text: var(--tg-theme-button-text-color, #fff);
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --radius: 14px;
      --tab-h: 60px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* SCREENS */
    .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 32px; text-align: center; }
    .screen.active { display: flex; }
    .screen-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .screen-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .screen-msg { font-size: 0.9rem; color: var(--hint); }

    /* SPINNER */
    #loadScreen { background: var(--bg); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--bg2); border-top-color: var(--btn); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* APP */
    #appScreen { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
    #appScreen.active { display: flex; }

    .header { background: var(--bg2); padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .header-title { font-weight: 700; font-size: 1.1rem; }
    .header-date { font-size: 0.78rem; color: var(--hint); }
    .role-badge { font-size: 0.78rem; padding: 4px 12px; border-radius: 20px; background: rgba(58,134,255,0.15); color: var(--btn); font-weight: 600; }

    /* STATUS BANNER */
    .status-banner {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: var(--radius);
      font-size: 0.85rem; font-weight: 600; margin-bottom: 12px;
    }
    .banner-open { background: rgba(239,68,68,0.15); color: var(--red); }
    .banner-closed { background: rgba(34,197,94,0.15); color: var(--green); }

    /* PERIOD TABS */
    .period-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .period-btn {
      flex: 1; padding: 8px 0; border-radius: 10px; border: none;
      background: var(--bg2); color: var(--hint);
      font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .period-btn.active { background: var(--btn); color: var(--btn-text); }

    /* TABS */
    .tab-content { flex: 1; overflow-y: auto; padding: 14px 14px 8px; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .bottom-tabs { height: var(--tab-h); background: var(--bg2); display: flex; flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.06); }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 0.6rem; color: var(--hint); cursor: pointer; transition: color 0.2s; border: none; background: none; }
    .tab-btn.active { color: var(--btn); }
    .tab-btn span { font-size: 1.3rem; }

    /* CARDS */
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .card { background: var(--bg2); border-radius: var(--radius); padding: 18px 14px; }
    .card-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .card-label { font-size: 0.78rem; color: var(--hint); margin-bottom: 6px; }
    .card-val { font-size: 1.4rem; font-weight: 700; }
    .green { color: var(--green); }
    .blue { color: var(--btn); }
    .yellow { color: var(--yellow); }

    /* BREAKDOWN */
    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--hint); margin-bottom: 10px; }
    .breakdown { background: var(--bg2); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
    .brow { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.92rem; }
    .brow:last-child { border-bottom: none; }
    .brow-label { color: var(--hint); }
    .brow-val { font-weight: 600; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }

    /* AVG PRICE CARD */
    .avg-price-card {
      background: var(--bg2); border-radius: var(--radius);
      padding: 16px; margin-bottom: 14px;
    }
    .avg-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--hint); margin-bottom: 10px; }
    .avg-row { font-size: 0.92rem; padding: 4px 0; }
    .avg-row.primary { font-weight: 700; color: var(--green); font-size: 1rem; }
    .avg-note { font-size: 0.75rem; color: var(--hint); margin-top: 8px; font-style: italic; }

    /* BAR CHART */
    .chart-section { margin-bottom: 14px; }
    .chart-bars {
      display: flex; align-items: flex-end; gap: 4px;
      height: 120px; background: var(--bg2);
      border-radius: var(--radius); padding: 12px 8px 0;
      overflow-x: auto;
    }
    .bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 28px; }
    .bar {
      width: 100%; border-radius: 4px 4px 0 0;
      background: var(--btn); min-height: 3px;
      transition: height 0.3s; position: relative;
    }
    .bar.today { background: var(--green); }
    .bar-val { font-size: 0.55rem; color: var(--hint); margin-bottom: 2px; text-align: center; }
    .bar-date { font-size: 0.6rem; color: var(--hint); padding: 4px 0 6px; text-align: center; }

    /* TOTALS SUMMARY */
    .totals-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .total-card { flex: 1; background: var(--bg2); border-radius: var(--radius); padding: 14px 10px; text-align: center; }
    .total-label { font-size: 0.7rem; color: var(--hint); margin-bottom: 6px; }
    .total-val { font-size: 1.1rem; font-weight: 700; }

    /* SNAPSHOTS */
    .snap-item { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; font-size: 0.85rem; }
    .snap-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .snap-time { font-weight: 700; color: var(--btn); }
    .snap-detail { color: var(--hint); }

    /* PROFILE */
    .modules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .mod-card { background: var(--bg2); border-radius: var(--radius); padding: 18px 14px; cursor: pointer; text-align: center; transition: opacity 0.15s; }
    .mod-card:active { opacity: 0.7; }
    .mod-icon { font-size: 1.8rem; margin-bottom: 8px; }
    .mod-label { font-size: 0.8rem; font-weight: 600; }

    .empty-msg { text-align: center; color: var(--hint); font-size: 0.85rem; padding: 24px; }

    /* TOAST */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--green); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; transition: transform 0.3s; z-index: 200; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* LOADING OVERLAY */
    .dash-loading { text-align: center; padding: 40px; color: var(--hint); font-size: 0.9rem; }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loadScreen" class="screen active">
  <div class="screen-icon">☕</div>
  <div class="screen-title">Cafe App</div>
  <div class="spinner"></div>
</div>

<!-- PENDING -->
<div id="pendingScreen" class="screen">
  <div class="screen-icon">🕐</div>
  <div class="screen-title">Очікуй підтвердження</div>
  <div class="screen-msg">Адміністратор ще не надав тобі доступ.<br>Напиши /start боту і зачекай.</div>
</div>

<!-- ERROR -->
<div id="errorScreen" class="screen">
  <div class="screen-icon">⚠️</div>
  <div class="screen-title">Помилка</div>
  <div class="screen-msg" id="errorMsg">Щось пішло не так.</div>
</div>

<!-- APP -->
<div id="appScreen" class="screen" style="height:100vh;overflow:hidden;">
  <div class="header">
    <div>
      <div class="header-title">☕ Cafe App</div>
      <div class="header-date" id="hDate"></div>
    </div>
    <div class="role-badge" id="hRole">—</div>
  </div>

  <div class="tab-content">
    <!-- Dashboard -->
    <div class="tab-pane active" id="tab-dash">

      <!-- Period toggle (admin only, hidden by default) -->
      <div class="period-tabs" id="periodTabs" style="display:none">
        <button class="period-btn active" data-period="day" onclick="selectPeriod(this)">День</button>
        <button class="period-btn" data-period="week" onclick="selectPeriod(this)">Тиждень</button>
        <button class="period-btn" data-period="month" onclick="selectPeriod(this)">Місяць</button>
      </div>

      <!-- Dynamic dashboard content -->
      <div id="dashContent">
        <div class="dash-loading"><div class="spinner" style="margin:0 auto 8px"></div>Завантаження...</div>
      </div>

    </div>

    <!-- Profile -->
    <div class="tab-pane" id="tab-profile">
      <div style="text-align:center;padding:24px 0 16px">
        <div style="font-size:3rem;margin-bottom:8px" id="p-avatar">👤</div>
        <div style="font-weight:700;font-size:1.1rem" id="p-name">—</div>
        <div style="color:var(--hint);font-size:0.8rem;margin-top:4px" id="p-username">—</div>
      </div>
      <div class="breakdown">
        <div class="brow"><span class="brow-label">Роль</span><span class="brow-val" id="p-role">—</span></div>
      </div>
      <div class="section-title" style="margin-top:14px">Активні модулі</div>
      <div id="p-modules"></div>
    </div>
  </div>

  <div class="bottom-tabs">
    <button class="tab-btn active" onclick="switchTab('dash',this)"><span>📊</span>Дашборд</button>
    <button class="tab-btn" onclick="switchTab('profile',this)"><span>👤</span>Профіль</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✅ Збережено!</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const API = '';
let currentUser = null;
let currentPeriod = 'day';
let dashRefreshTimer = null;

const ROLES = { admin:'Адмін', super_admin:'Супер-адмін', chef:'Шеф', barista:'Баріста', young:'Стажер', trainee:'Стажер' };
const MODULES_META = {
  cash_income:  { icon:'💵', label:'Готівка' },
  card_income:  { icon:'💳', label:'Картка' },
  coffee_count: { icon:'☕', label:'Порції кави' },
  deposits:     { icon:'📥', label:'Вплата в касу' },
  withdrawals:  { icon:'📤', label:'Виплата з каси' },
  expenses:     { icon:'🧾', label:'Витрати' },
  reports:      { icon:'📊', label:'Звіт' },
};

function show(id) {
  ['loadScreen','pendingScreen','errorScreen','appScreen'].forEach(s => {
    const el = document.getElementById(s);
    if (el) { el.classList.remove('active'); el.style.display = ''; }
  });
  const target = document.getElementById(id);
  if (target) {
    target.classList.add('active');
    target.style.display = 'flex';
  }
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return (Number(n)||0).toLocaleString('uk-UA', {minimumFractionDigits:0, maximumFractionDigits:2}) + ' zł';
}

function fmtShort(n) {
  if (n === null || n === undefined || n === 0) return '0';
  const v = Number(n);
  if (v >= 1000) return (v/1000).toFixed(1) + 'k';
  return v.toFixed(0);
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function isAdminUser() {
  if (!currentUser) return false;
  return currentUser.role === 'admin' || currentUser.role === 'super_admin' || currentUser.id === 199897236;
}

function selectPeriod(btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPeriod = btn.dataset.period;
  loadDashboard(currentPeriod);
}

// ── DASHBOARD RENDERING ──────────────────────────────────────────────────────

async function loadDashboard(period) {
  period = period || 'day';
  const container = document.getElementById('dashContent');
  container.innerHTML = '<div class="dash-loading"><div class="spinner" style="margin:0 auto 8px"></div>Завантаження...</div>';

  try {
    if (isAdminUser() && period !== 'day') {
      const data = await fetch(`${API}/api/analytics?user_id=${currentUser.id}&period=${period}&date=${today()}`)
        .then(r => r.json());
      renderAnalytics(data, container);
    } else {
      const data = await fetch(`${API}/api/summary`).then(r => r.json());
      renderDayDashboard(data, container);
    }
  } catch(e) {
    container.innerHTML = `<div class="empty-msg">⚠️ Помилка завантаження</div>`;
    console.error('loadDashboard:', e);
  }
}

function renderDayDashboard(s, container) {
  const isFinalized = s.is_finalized;
  const closedTime = s.closed_at ? s.closed_at.slice(11, 16) : '';
  const bannerClass = isFinalized ? 'banner-closed' : 'banner-open';
  const bannerText = isFinalized
    ? '✅ День закрито' + (closedTime ? ' о ' + closedTime : '')
    : '🔴 День ще не закрито';

  const cashIncome = s.cash_income ?? 0;
  const cardIncome = s.card_income ?? 0;
  const coffeePortions = s.coffee_portions ?? 0;
  const closingCash = s.closing_cash;
  const openingCash = s.opening_cash ?? 0;
  const adminWit = s.admin_withdrawals ?? 0;
  const adminDep = s.admin_deposits ?? 0;
  const expenses = s.expenses ?? 0;

  // Avg price
  let avgHtml = '';
  if (coffeePortions > 0) {
    const avgCash = cashIncome / coffeePortions;
    const avgTotal = (cashIncome + cardIncome) / coffeePortions;
    const hasCard = cardIncome > 0;
    avgHtml = `
      <div class="avg-price-card">
        <div class="avg-title">☕ Середня ціна порції</div>
        <div class="avg-row${!hasCard ? ' primary' : ''}">💵 Готівкова: ${avgCash.toFixed(2)} zł</div>
        ${hasCard ? `<div class="avg-row primary">💳 Загальна: ${avgTotal.toFixed(2)} zł</div>` : ''}
        ${!hasCard ? '<div class="avg-note">(картку не внесено — неточна)</div>' : ''}
      </div>`;
  }

  // Snapshots
  const snaps = s.snapshots || [];
  const snapsHtml = snaps.length ? snaps.map(snap => {
    const parts = [];
    if (snap.cash_amount != null) parts.push('💵 каса ' + fmt(snap.cash_amount));
    if (snap.coffee_portions != null) parts.push('☕ кава ' + snap.coffee_portions + ' шт');
    return `<div class="snap-item">
      <div class="snap-top"><span class="snap-time">${snap.time || ''}</span></div>
      <div class="snap-detail">${parts.join(' · ') || '—'}${snap.notes ? ' · ' + snap.notes : ''}</div>
    </div>`;
  }).join('') : '<div class="empty-msg">Зрізів ще немає</div>';

  container.innerHTML = `
    <div id="dayStatus" class="status-banner ${bannerClass}">${bannerText}</div>

    <div class="cards">
      <div class="card">
        <div class="card-icon">💵</div>
        <div class="card-label">Виручка готівка</div>
        <div class="card-val green">${fmt(cashIncome)}</div>
      </div>
      <div class="card">
        <div class="card-icon">💳</div>
        <div class="card-label">Виручка картка</div>
        <div class="card-val blue">${fmt(cardIncome)}</div>
      </div>
      <div class="card">
        <div class="card-icon">☕</div>
        <div class="card-label">Порцій кави</div>
        <div class="card-val yellow">${coffeePortions} шт</div>
      </div>
      <div class="card">
        <div class="card-icon">🏦</div>
        <div class="card-label">Каса</div>
        <div class="card-val">${closingCash != null ? fmt(closingCash) : 'Не закрито'}</div>
      </div>
    </div>

    ${avgHtml}

    <div class="section-title">Деталі сьогодні</div>
    <div class="breakdown">
      <div class="brow"><span class="brow-label">💵 Виручка готівка</span><span class="brow-val pos">${fmt(cashIncome)}</span></div>
      <div class="brow"><span class="brow-label">💳 Виручка картка</span><span class="brow-val pos">${fmt(cardIncome)}</span></div>
      <div class="brow"><span class="brow-label">🏦 Розмінка (відкриття)</span><span class="brow-val">${fmt(openingCash)}</span></div>
      ${adminWit ? `<div class="brow"><span class="brow-label">📤 Адмін виплати</span><span class="brow-val neg">${fmt(adminWit)}</span></div>` : ''}
      ${adminDep ? `<div class="brow"><span class="brow-label">📥 Адмін вплати</span><span class="brow-val pos">${fmt(adminDep)}</span></div>` : ''}
      ${expenses ? `<div class="brow"><span class="brow-label">🧾 Витрати</span><span class="brow-val neg">${fmt(expenses)}</span></div>` : ''}
    </div>

    <div class="section-title">📸 Зрізи за день</div>
    <div id="snapshotsList">${snapsHtml}</div>
  `;
}

function renderAnalytics(data, container) {
  const rows = data.rows || [];
  const totals = data.totals || {};
  const period = data.period;
  const todayStr = today();

  // Totals strip
  const totalHtml = `
    <div class="totals-row">
      <div class="total-card">
        <div class="total-label">💵 Готівка</div>
        <div class="total-val green">${fmt(totals.total_cash_income)}</div>
      </div>
      <div class="total-card">
        <div class="total-label">💳 Картка</div>
        <div class="total-val blue">${fmt(totals.total_card_income)}</div>
      </div>
      <div class="total-card">
        <div class="total-label">☕ Порції</div>
        <div class="total-val yellow">${totals.total_coffee || 0}</div>
      </div>
    </div>`;

  // Avg price
  let avgHtml = '';
  if (totals.total_coffee > 0) {
    const hasCard = totals.has_card_data;
    avgHtml = `
      <div class="avg-price-card">
        <div class="avg-title">☕ Середня ціна порції</div>
        <div class="avg-row${!hasCard ? ' primary' : ''}">💵 Готівкова: ${totals.avg_price_cash ?? '—'} zł</div>
        ${hasCard ? `<div class="avg-row primary">💳 Загальна: ${totals.avg_price_total ?? '—'} zł</div>` : ''}
        ${!hasCard ? '<div class="avg-note">(картку не внесено — неточна)</div>' : ''}
      </div>`;
  }

  // Bar chart
  const maxVal = Math.max(...rows.map(r => r.cash_income || 0), 1);
  const barsHtml = rows.map(r => {
    const pct = Math.round(((r.cash_income || 0) / maxVal) * 80);
    const isToday = r.date === todayStr;
    const label = r.date ? r.date.slice(5) : ''; // MM-DD
    return `<div class="bar-wrap">
      <div class="bar-val">${fmtShort(r.cash_income)}</div>
      <div class="bar ${isToday ? 'today' : ''}" style="height:${pct}px"></div>
      <div class="bar-date">${label}</div>
    </div>`;
  }).join('');

  // Rows table
  const rowsHtml = rows.map(r => {
    const statusIcon = r.is_finalized ? '✅' : '🔴';
    return `<div class="brow">
      <span class="brow-label">${statusIcon} ${r.date}</span>
      <span class="brow-val pos">${fmt(r.cash_income)}${r.card_income ? ' + ' + fmt(r.card_income) : ''}</span>
    </div>`;
  }).join('');

  container.innerHTML = `
    ${totalHtml}
    ${avgHtml}
    <div class="chart-section" id="chartSection">
      <div class="section-title">📈 Чиста виручка (готівка)</div>
      <div class="chart-bars" id="chartBars">${barsHtml}</div>
    </div>
    <div class="section-title" style="margin-top:14px">📅 По днях</div>
    <div class="breakdown">${rowsHtml || '<div class="empty-msg">Немає даних</div>'}</div>
  `;
}

function buildProfile(user, role, modules) {
  const name = (user.first_name||'') + (user.last_name?' '+user.last_name:'');
  document.getElementById('p-avatar').textContent = (name[0]||'?').toUpperCase();
  document.getElementById('p-name').textContent = name || 'Без імені';
  document.getElementById('p-username').textContent = user.username ? '@'+user.username : '';
  document.getElementById('p-role').textContent = ROLES[role]||role||'—';
  const pm = document.getElementById('p-modules');
  const activeMods = Object.entries(modules).filter(([,v])=>v);
  pm.innerHTML = activeMods.map(([k]) => {
    const m = MODULES_META[k];
    return m ? `<div class="brow"><span class="brow-label">${m.icon} ${m.label}</span><span style="color:var(--green)">✓</span></div>` : '';
  }).join('') || '<div class="empty-msg">Немає активних модулів</div>';
  pm.className = 'breakdown';
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function init() {
  const user = tg?.initDataUnsafe?.user;

  if (!user) {
    document.getElementById('errorMsg').textContent = 'Відкрий через @cafe_app_bot у Telegram';
    show('errorScreen');
    return;
  }

  try {
    const resp = await fetch(API + '/api/auth', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ init_data: tg?.initData||'', user_id: user.id })
    });
    const data = await resp.json();

    if (data.status === 'approved') {
      currentUser = { ...user, role: data.role, modules: data.modules || {} };
      const roleLabel = ROLES[data.role] || data.role || '—';
      document.getElementById('hDate').textContent = new Date().toLocaleDateString('uk-UA', {day:'numeric', month:'long'});
      document.getElementById('hRole').textContent = roleLabel;
      buildProfile(user, data.role, data.modules || {});

      // Show period toggle for admins
      if (isAdminUser()) {
        document.getElementById('periodTabs').style.display = 'flex';
      }

      show('appScreen');
      loadDashboard('day');

      // Auto-refresh every 30s (day view only)
      dashRefreshTimer = setInterval(() => {
        if (currentPeriod === 'day') loadDashboard('day');
      }, 30000);

    } else if (data.status === 'pending') {
      show('pendingScreen');
    } else {
      document.getElementById('errorMsg').textContent = 'Доступ заборонено';
      show('errorScreen');
    }
  } catch(e) {
    document.getElementById('errorMsg').textContent = 'Помилка з\'єднання: ' + e.message;
    show('errorScreen');
  }
}

init();
</script>
</body>
</html>
